<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Time Calculator</h1>

        <p class="subtitle">
            Paste Durations (hh:mm:ss or mm:ss) on separate lines and click "Calculate Total Time" to get the total duration.
        </p>

        <textarea
            id="input"
            rows="10"
            placeholder="Example:
1:20:30
45:10
2:05:00"
        ></textarea>

        <button id="calculateBtn">Calculate Total Time</button>

        <div class="result-box">
            <p class="result-label">Total Duration</p>
            <p id="output">0h 0m 0s</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
